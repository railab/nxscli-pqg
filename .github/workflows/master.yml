name: master

# Triggers the workflow on push or pull request events
on: [push, pull_request]

jobs:
  master:
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      matrix:
        include:
          # linux
          - os: ubuntu-latest
            python: '3.10'
            toxenv: py
          - os: ubuntu-latest
            python: '3.11'
            toxenv: py
          - os: ubuntu-latest
            python: '3.12'
            toxenv: py
          - os: ubuntu-latest
            python: '3.13'
            toxenv: py
          - os: ubuntu-latest
            python: '3.14'
            toxenv: py
          # windows
          - os: windows-latest
            python: "3.10"
            toxenv: py
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
          python-version: ${{ matrix.python }}
    - name: Install Linux Qt runtime deps
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libopengl0
    - run: python -m pip install --upgrade setuptools pip tox virtualenv
    - run: tox -e ${{ matrix.toxenv }}
